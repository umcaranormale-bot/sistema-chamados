<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Hospital</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .cartao-paciente {
            border-left: 5px solid #0056b3;
            background-color: #e9ecef;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 16px;
        }
        button:hover { background-color: #004494; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Fila de Espera - Triagem</h1>
        
        <button onclick="chamarGarcom()">Buscar Pacientes no Servidor C#</button>

        <div id="tela-de-resultados">
            <p>Os pacientes aparecerão aqui...</p>
        </div>
    </div>

    <script>
        function chamarGarcom() {
            
            // ========================================================
            // COLOQUE SEU ENDEREÇO AQUI ABAIXO!
            // Substitua o 'https://localhost:7123' pelo número da sua porta
            // ========================================================
            const enderecoAPI = 'https://localhost:57064/api/pacientes';

            
            // O código abaixo vai até aquele endereço buscar os dados
            fetch(enderecoAPI)
                .then(resposta => resposta.json()) 
                .then(dadosRecebidos => {
                    
                    const tela = document.getElementById('tela-de-resultados');
                    tela.innerHTML = ''; 

                    // Desenha um cartãozinho para cada paciente que veio do SQL
                    dadosRecebidos.forEach(paciente => {
                        tela.innerHTML += `
                            <div class="cartao-paciente">
                                <h3>👤 ${paciente.nome}</h3>
                                <p><strong>Idade:</strong> ${paciente.idade} anos</p>
                                <p><strong>Sintoma relatado:</strong> ${paciente.sintoma}</p>
                            </div>
                        `;
                    });

                })
                .catch(erro => {
                    alert("Erro ao conectar! O C# está rodando? A porta está certa?");
                });
        }
    </script>

</body>
</html>
