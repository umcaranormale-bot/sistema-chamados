<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Painel - Help Desk</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* A NOVA BARRA DO TOPO (HEADER) */
        .cabecalho {
            width: 100%;
            max-width: 700px;
            background-color: #212529; /* Mesma cor escura e moderna do login */
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between; /* Empurra o nome pra esquerda e o botão pra direita */
            align-items: center;
            margin-bottom: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .boas-vindas { font-size: 18px; font-weight: bold; }
        .nome-destaque { color: #0dcaf0; } /* Um azul claro para destacar o nome */
        
        /* O BOTÃO DE SAIR VERMELHO */
        .btn-sair {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-sair:hover { background-color: #b02a37; }

        /* O resto do design original */
        .container-painel { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 700px; margin-bottom: 30px; box-sizing: border-box; }
        h2 { color: #0d6efd; margin-top: 0; }
        .grupo-campo { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-salvar { background-color: #198754; color: white; padding: 12px 20px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }
        .btn-salvar:hover { background-color: #157347; }
        .opcional { color: #888; font-size: 12px; font-weight: normal; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
        th { background: #eee; }
    </style>
</head>
<body>

    <header class="cabecalho">
        <div class="boas-vindas">
            Olá, <span id="nome-usuario" class="nome-destaque">Usuário</span>! 👋
        </div>
        <button class="btn-sair" onclick="fazerLogout()">Sair do Sistema</button>
    </header>

    <div class="container-painel">
        <h2>📝 Abrir Novo Chamado</h2>
        <form id="form-chamado" onsubmit="enviarChamado(event)">
            
            <div class="grupo-campo">
                <div class="grupo-campo">
                <label>Nome do Solicitante</label>
                <input type="text" id="nomeSolicitante" readonly style="background-color: #e9ecef; cursor: not-allowed;">
            </div>
                <label>Categoria (Obrigatório)</label>
                <label for="tipoSuporte">Tipo de Suporte:</label>
                <select id="tipoSuporte" onchange="atualizarCategorias()" required style="width: 100%; padding: 8px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="">Selecione primeiro onde está o problema...</option>
                <option value="sistemas">🖥️ Suporte ao Sistema (Ex: Soul MV, PEP, IDCE...)</option>
                <option value="equipamentos">🔌 Suporte Técnico ao Equipamentos e Rede (Ex: PC não liga, Impressora, Internet, Ramal...)</option>
                </select>

                <label for="categoria">Categoria do Problema:</label>
                <select id="categoria" required style="width: 100%; padding: 8px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="">Escolha um tipo de suporte acima primeiro</option>
                </select>
            </div>

            <div class="grupo-campo">
                <label>Setor (Obrigatório)</label>
                <select id="setor" onchange="atualizarLocalizacao()" required>
                    <option value="">Selecione...</option>
                    <option value="Acolhimento Cirúrgico">Acolhimento Cirúrgico</option>
                    <option value="Casa das Marias">Casa das Marias</option>
                    <option value="Cirurgia Geral">Cirurgia Geral</option>
                    <option value="Clínica Médica (6° Direito)">Clínica Médica (6° Direito)</option>
                    <option value="Clínica Médica (6° Esquerdo)">Clínica Médica (6° Esquerdo)</option>
                    <option value="Direção">Direção</option>
                    <option value="Emergência Obstétrica">Emergência Obstétrica</option>
                    
                    <option value="Emergência Pediátrica">Emergência Pediátrica</option>
                    
                    <option value="Faturamento">Faturamento</option>
                    <option value="Financeiro">Financeiro</option>
                    <option value="Manutenção">Manutenção</option>
                    <option value="Pavilhão(Clínica Pediátrica)">Pavilhão(Clínica Pediátrica)</option>
                    <option value="Pavilhão(Clínica Pediátrica)">Pavilhão(Clínica Pediátrica)</option>
                    <option value="Portaria">Portaria</option>
                    <option value="Proctologia">Proctologia</option>
                    <option value="Recepcao">Recepção</option>
                    <option value="Rouparia">Rouparia</option>
                    <option value="SAF">SAF</option>
                    <option value="Sala 3">Sala 3</option>
                    <option value="SENF">SENF</option>
                    <option value="Suprimentos">Suprimentos</option>
                    <option value="UTI Neo 1">UTI Neo 1</option>
                    <option value="UTI Neo 2">UTI Neo 2</option>
                    <option value="UTI">UTI Adulto</option>
                </select>
            </div> <div class="grupo-campo" id="caixa-localizacao" style="display: none;">
                <label>Localização (Obrigatório)</label>
                <select id="localizacao" style="width: 100%; padding: 8px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc;">
                    <option value="">Selecione o local exato...</option>
                </select>
            </div>

            <div class="grupo-campo">
                <label>Descrição do Problema (Obrigatório)</label>
                <textarea id="descricao" rows="4" required placeholder="Descreva o problema..." style="resize: none;"></textarea>
            </div>

            <div class="grupo-campo">
                <label>IP do Computador <span class="opcional">(Opcional)</span> - <small style="color: #0d6efd;">(Veja o tutorial abaixo se não souber)</small></label>
                
                <input type="text" id="ip" placeholder="Ex: 10.21.6.57" style="margin-bottom: 15px;">
                
                <video controls style="width: 100%; max-width: 350px; height: auto; border-radius: 4px; border: 1px solid #ccc; background-color: #000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: block;" autoplay loop muted>
                    <source src="tutorial-visualizar-ip.mp4" type="video/mp4">
                    Seu navegador não suporta a exibição de vídeos.
                </video>
            </div>

            <div class="grupo-campo">
                <label>Ramal <span class="opcional">(Opcional)</span></label>
                <input type="text" id="ramal" placeholder="Ex: 4052">
            </div>

            <button type="submit" class="btn-salvar">Gerar Número e Abrir Chamado</button>
        </form>
    </div>

    <div class="container-painel">
        <h2>📋 Meus Chamados Abertos</h2>
        <table>
            <thead>
                <tr>
                    <th>Protocolo</th>
                    <th>Categoria</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Ação</th> </tr>
                </thead>
            <tbody id="tabela-corpo">
                </tbody>
        </table>
    </div>

    <div id="fundo-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;"></div>

            <div id="modal-detalhes" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:25px; border-radius:8px; width:450px; z-index:1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
                <h3 id="modal-numero" style="color: #0d6efd; margin-top: 0; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px;">TIC-XXXXX</h3>
                
                <p><strong>Setor:</strong> <span id="modal-setor"></span></p>
                <p><strong>Categoria:</strong> <span id="modal-categoria"></span></p>
                
                <p><strong>Descrição do Problema:</strong></p>
                <textarea id="modal-descricao" rows="3" style="width: 100%; background-color: #f8f9fa; border: 1px solid #ddd; border-radius: 4px; padding: 8px; resize: none;" readonly></textarea>
                
                <hr style="border: 1px solid #eee; margin: 15px 0;">
                <p style="margin-bottom: 5px; color: #333;"><strong>💬 Histórico / Chat:</strong></p>
                
                <div id="caixa-chat" style="height: 180px; overflow-y: auto; background: #f0f2f5; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px;">
                    </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="input-mensagem" placeholder="Escreva uma mensagem..." style="flex: 1; margin: 0; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    <button onclick="enviarMensagem()" style="background: #198754; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;">Enviar</button>
                </div>
                <button onclick="fecharModal()" style="background: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold;">Fechar</button>
            </div>

    <script>

        let chamadoAbertoId = 0; 
        let loopChat = null;

        // Pega os dados do Crachá Virtual
        const idLogado = localStorage.getItem('usuarioLogado_Id');
        const nomeLogado = localStorage.getItem('usuarioLogado_Nome');
        const emailLogado = localStorage.getItem('usuarioLogado_Email');

        // Se a pessoa tentar acessar direto sem logar, chuta ela de volta pro login
        if(!idLogado) {
            window.location.href = "sistema.html";
        } else {
            document.getElementById('nome-usuario').innerText = nomeLogado;
            // ADICIONE ESTA LINHA AQUI: Preenche a caixinha visualmente
            document.getElementById('nomeSolicitante').value = nomeLogado;
        }

        // --- A NOVA FUNÇÃO DE LOGOUT ---
        function fazerLogout() {
            if(confirm("Tem certeza que deseja sair do sistema?")) {
                localStorage.clear(); // Apaga o crachá do navegador (Id, Nome e Perfil)
                window.location.href = "sistema.html"; // Redireciona para o login
            }
        }

        // Funções antigas (mantidas exatamente iguais)
        // 1. Variável para guardar a memória dos chamados (igual no painel técnico)
let chamadosDoUsuario = [];

function carregarMeusChamados() {
    // O "?t=" + getTime() obriga o navegador a sempre buscar o status mais recente do C#
    fetch(`http://10.21.3.8:61759/api/chamados/usuario/${idLogado}?t=` + new Date().getTime())
        .then(res => res.json())
        .then(chamados => {
            chamadosDoUsuario = chamados; // Salva na memória
            const corpo = document.getElementById('tabela-corpo');
            corpo.innerHTML = '';
            
            chamados.forEach((c, index) => { 
                corpo.innerHTML += `
                    <tr>
                        <td>${c.numero}</td>
                        <td>${c.categoria}</td>
                        <td>${c.data}</td>
                        <td><strong>${c.status}</strong></td>
                        <td>
                            <button onclick="abrirModal(${index})" style="background: #0dcaf0; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Ver Detalhes</button>
                        </td>
                    </tr>
                `;
            });
        });
}

            // 2. Função para abrir a janelinha com os dados
            function abrirModal(index) {
            const chamado = chamadosDoUsuario[index];

            document.getElementById('modal-numero').innerText = chamado.numero;
            document.getElementById('modal-categoria').innerText = chamado.categoria;
            document.getElementById('modal-descricao').value = chamado.descricao || "Sem descrição."; 
            
            // Liga o Chat
            chamadoAbertoId = chamado.id; 
            carregarChat(chamadoAbertoId); 
            if (loopChat) clearInterval(loopChat);
            loopChat = setInterval(() => carregarChat(chamadoAbertoId), 5000);

            document.getElementById('fundo-modal').style.display = 'block';
            document.getElementById('modal-detalhes').style.display = 'block';
        }

        function fecharModal() {
            document.getElementById('fundo-modal').style.display = 'none';
            document.getElementById('modal-detalhes').style.display = 'none';
            if (loopChat) clearInterval(loopChat); // Desliga o relógio do chat
        }

        function enviarChamado(event) {
            event.preventDefault(); 
            const urlAPI = 'http://10.21.3.8:61759/api/chamados';

            // =====================================
            // TRUQUE DA CONCATENAÇÃO
            // =====================================
            let setorFinal = document.getElementById('setor').value;
            const locSelecionada = document.getElementById('localizacao').value;
            const caixaLoc = document.getElementById('caixa-localizacao');

            // Se a caixa de localização estiver visível e preenchida, junta os textos!
            if (caixaLoc.style.display === 'block' && locSelecionada !== "") {
                setorFinal = setorFinal + " - " + locSelecionada;
            }
            // =====================================

            const pacoteDados = {
                Nome: nomeLogado, 
                Email: emailLogado,
                Categoria: document.getElementById('categoria').value,
                Setor: setorFinal, // <-- Usa a variável juntada aqui!
                DescricaoProblema: document.getElementById('descricao').value,
                IP: document.getElementById('ip').value,
                Ramal: document.getElementById('ramal').value,
                UsuarioId: parseInt(idLogado)
            };

            fetch(urlAPI, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(pacoteDados)
            })
            .then(resposta => resposta.json())
            .then(dadosRetornados => {
                alert("✅ " + dadosRetornados.mensagem + "\n\nSeu Número de Protocolo é: " + dadosRetornados.numero);
                
                document.getElementById('form-chamado').reset(); 
                document.getElementById('nomeSolicitante').value = nomeLogado;
                document.getElementById('categoria').innerHTML = '<option value="">Escolha um tipo de suporte acima primeiro</option>';
                
                // ESCONDE A CAIXA DE LOCALIZAÇÃO PARA O PRÓXIMO CHAMADO
                document.getElementById('caixa-localizacao').style.display = 'none';
                
                carregarMeusChamados(); 
            });
        }

                    // =========================================================
            // 📌 DICIONÁRIO DE CATEGORIAS (FÁCIL DE EDITAR AQUI!)
            // =========================================================
            // Para adicionar mais, basta colocar uma vírgula e escrever a nova categoria em baixo!
            const listasDeCategorias = {
                
                "sistemas": [
                    "Erro no Sistema Hospitalar (SoulMV/PEP)",
                    "Reset de Senha(MV/PEP)/ Desbloqueio de Usuário(MV/PEP)",
                    "Lentidão no Sistema",
                    "Outros (Software)"
                ],

                "equipamentos": [
                    "Computador não liga",
                    "Criação de Novo Acesso",
                    "Falta de Internet / Problema no Cabo de Rede",
                    "Impressora com defeito / Sem Toner",
                    "Teclado ou Mouse com defeito",
                    "Telefone / Ramal Mudo",
                    "Outros (Equipamentos)"
                ]
            };

            // =========================================================
            // 📌 DICIONÁRIO DE LOCALIZAÇÕES
            // =========================================================
            const listasDeLocalizacoes = {
                "Emergência Pediátrica": [
                    "Posto (Sala Vermelha)",
                    "Sala Verde",
                    "Sala Amarela",
                    "Consultório 1",
                    "Consultório 2"
                ],

                "Emergência Obstétrica": [
                    "Posto",
                    "Consultório 1",
                    "Consultório 2"
                ]

                
                // Se no futuro você quiser fazer isso para a UTI, é só adicionar aqui:
                // "UTI Adulto": ["Leito 1", "Leito 2", "Leito 3"]
            };

            function atualizarLocalizacao() {
                const setorSelecionado = document.getElementById('setor').value;
                const caixaLocalizacao = document.getElementById('caixa-localizacao');
                const selectLocalizacao = document.getElementById('localizacao');

                // Limpa as opções da localização
                selectLocalizacao.innerHTML = '<option value="">Selecione o local exato...</option>';

                // Se o setor escolhido estiver no nosso dicionário de localizações...
                if (listasDeLocalizacoes[setorSelecionado]) {
                    caixaLocalizacao.style.display = 'block'; // Mostra a caixa
                    selectLocalizacao.required = true; // Torna obrigatório preencher

                    // Preenche com as opções
                    listasDeLocalizacoes[setorSelecionado].forEach(loc => {
                        selectLocalizacao.innerHTML += `<option value="${loc}">${loc}</option>`;
                    });
                } else {
                    // Se o setor não tem localização específica, esconde a caixa
                    caixaLocalizacao.style.display = 'none';
                    selectLocalizacao.required = false; 
                    selectLocalizacao.value = ""; 
                }
            }

            // =========================================================
            // FUNÇÃO QUE FAZ A TROCA DAS OPÇÕES NA TELA
            // =========================================================
            function atualizarCategorias() {
                // Descobre qual opção o usuário escolheu (sistemas ou equipamentos)
                const tipoSelecionado = document.getElementById('tipoSuporte').value;
                const selectCategoria = document.getElementById('categoria');

                // Limpa a caixinha de baixo sempre que o usuário trocar a opção de cima
                selectCategoria.innerHTML = '<option value="">Selecione a Categoria exata...</option>';

                // Se o usuário selecionou uma opção válida
                if (tipoSelecionado !== "") {
                    // Pega a lista certa do nosso dicionário ali em cima
                    const categoriasParaMostrar = listasDeCategorias[tipoSelecionado];

                    // Cria uma nova <option> para cada item da lista
                    categoriasParaMostrar.forEach(cat => {
                        selectCategoria.innerHTML += `<option value="${cat}">${cat}</option>`;
                    });
                }
            }

                function carregarChat(idChamado) {
        fetch(`http://10.21.3.8:61759/api/chamados/${idChamado}/comentarios`)
        .then(res => res.json())
        .then(mensagens => {
            const caixa = document.getElementById('caixa-chat');
            caixa.innerHTML = ''; 
            
            if (mensagens.length === 0) {
                caixa.innerHTML = '<p style="text-align:center; color:#888; font-size:14px; margin-top:20px;">Nenhuma mensagem. Inicie a conversa!</p>';
                return;
            }

            mensagens.forEach(m => {
                const ehMinha = m.remetenteId === parseInt(idLogado);
                const corFundo = ehMinha ? '#d1e7dd' : '#e2e3e5';
                const alinhamento = ehMinha ? 'align-self: flex-end;' : 'align-self: flex-start;';
                const quemEnviou = ehMinha ? 'Você' : `${m.nomeRemetente} (${m.perfilRemetente})`;

                caixa.innerHTML += `
                    <div style="max-width: 85%; padding: 8px 12px; border-radius: 8px; background: ${corFundo}; ${alinhamento}">
                        <strong style="font-size: 11px; color: #555;">${quemEnviou} - ${m.data}</strong><br>
                        <span style="font-size: 14px; color: #000;">${m.mensagem}</span>
                    </div>
                `;
            });
            caixa.scrollTop = caixa.scrollHeight;
        });
    }

    function enviarMensagem() {
        const input = document.getElementById('input-mensagem');
        const texto = input.value.trim();
        
        if (texto === '') return; 

        fetch('http://10.21.3.8:61759/api/chamados/comentario', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                ChamadoId: chamadoAbertoId, 
                RemetenteId: parseInt(idLogado), 
                Mensagem: texto 
            })
        }).then(() => {
            input.value = ''; 
            carregarChat(chamadoAbertoId); 
        });
    }

            

        // Carrega a tabela assim que a página abrir
        carregarMeusChamados();

        // 👇 ADICIONE ESTA LINHA ABAIXO 👇
        // Ativa o relógio: atualiza a tela do usuário automaticamente a cada 10 segundos
        setInterval(carregarMeusChamados, 10000);
                
    </script>

</body>
</html>
