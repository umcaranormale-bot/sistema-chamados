<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel do Técnico - TI</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 10px rgba(5, 5, 5, 0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #0d6efd; color: white; }
        
        /* Estilo dos Filtros */
        .filtros { margin: 20px 0; display: flex; gap: 10px; }
        .btn-filtro { padding: 8px 15px; border: 1px solid #0d6efd; background: white; color: #0d6efd; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-filtro.ativo { background: #0d6efd; color: white; }
        /* Botão Suspender (Cinza) */
        .btn-suspender { background: #6c757d; color: white; }
        /* Botão Abrir (Azul claro) */
        .btn-abrir { background: #0dcaf0; color: black; }
        
        .btn-status { cursor: pointer; padding: 5px; background: #ffc107; border: none; border-radius: 3px; font-weight: bold;}
    </style>
</head>
<body>
    <div class="card">
        <h2>🛠 Gerenciamento de TI</h2>
        <a href="sistema.html" style="color: red; text-decoration: none;">Sair do Sistema</a>

        <div class="filtros">
            <button class="btn-filtro ativo" onclick="filtrar('Todos', this)">Todos</button>
            <button class="btn-filtro" onclick="filtrar('Aberto', this)">Abertos</button>
            <button class="btn-filtro" onclick="filtrar('Em Atendimento', this)">Em Atendimento</button>
            <button class="btn-filtro" onclick="filtrar('Finalizado', this)">Finalizados</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Usuário</th>
                    <th>Protocolo</th>
                    <th>Categoria</th>
                    <th>Setor</th>
                    <th>Status</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="lista-geral"></tbody>
        </table>
    </div>

    <script>
    let chamadosOriginais = []; // Guardamos a lista completa aqui

    function buscarTodos() {
        // Atenção: Usei a rota que criamos juntos (/api/chamados). 
        // Se no seu C# você colocou /todos no final, lembre de ajustar aqui!
        fetch('http://10.21.3.8:61759/api/chamados')
            .then(res => res.json())
            .then(dados => {
                chamadosOriginais = dados;
                renderizarTabela(dados);
            });
    }

    function renderizarTabela(lista) {
    const corpo = document.getElementById('lista-geral');
    corpo.innerHTML = '';

    lista.forEach(c => {
        let botoesAcao = '';

        // LÓGICA DE BOTÕES DINÂMICOS
        // Ajustado para reconhecer a nova palavra "Concluído"
        if (c.status === 'Finalizado' || c.status === 'Concluído') {
            botoesAcao = '✅ Concluído';
        } 
        else if (c.status === 'Suspenso') {
            botoesAcao = `<button class="btn-status" style="background:#0dcaf0;" onclick="mudarStatus(${c.id}, 'Aberto')">Abrir Chamado</button>`;
        } 
        else {
            if (c.status === 'Aberto') {
                botoesAcao += `<button class="btn-status" style="background:#ffc107;" onclick="mudarStatus(${c.id}, 'Em Atendimento')">Atender</button> `;
            } 
            else if (c.status === 'Em Atendimento') {
                // ==========================================
                // AQUI ESTÁ A MUDANÇA DO BOTÃO!
                // ==========================================
                botoesAcao += `<button class="btn-status" style="background:#198754; color:white;" onclick="prepararConclusao(${c.id})">Concluir com Resposta</button> `;
            }

            botoesAcao += `<button class="btn-status" style="background:#6c757d; color:white;" onclick="mudarStatus(${c.id}, 'Suspenso')">Suspender</button>`;
        }

        corpo.innerHTML += `
            <tr>
                <td>${c.nome || 'Usuário'}</td>
                <td>${c.numero}</td>
                <td>${c.categoria}</td>
                <td>${c.setor}</td>
                <td id="status-${c.id}"><strong>${c.status}</strong></td>
                <td>
                    <button onclick="abrirModal(${c.id})" style="background: #0dcaf0; border: none; padding: 5px; border-radius: 3px; cursor: pointer; font-weight: bold; margin-right: 5px;">Detalhes</button>
                    ${botoesAcao}
                </td>
            </tr>
        `;
    });
}

// ==========================================
// NOVAS FUNÇÕES (Ficam fora da tabela)
// ==========================================

function prepararConclusao(id) {
    // Abre a janelinha nativa do navegador para digitar o texto
    const resposta = prompt("Descreva o que foi feito para resolver este chamado (Laudo Técnico):");
    
    // Só envia se o técnico realmente digitou algo e não apertou "Cancelar"
    if (resposta != null && resposta.trim() !== "") {
        enviarConclusao(id, resposta);
    }
}

function enviarConclusao(id, resposta) {
    fetch('http://10.21.3.8:61759/api/chamados/atualizar-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
            ChamadoId: id, 
            NovoStatus: 'Concluído', 
            Solucao: resposta 
        })
    }).then(() => buscarTodos());
}

    function filtrar(status, botao) {
        // Muda a aparência dos botões
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('ativo'));
        botao.classList.add('ativo');

        if (status === 'Todos') {
            renderizarTabela(chamadosOriginais);
        } else {
            const filtrados = chamadosOriginais.filter(c => c.status === status);
            renderizarTabela(filtrados);
        }
    }

    function mudarStatus(id, novo) {
    console.log(`Tentando mudar o chamado ${id} para o status: ${novo}`);

    fetch('http://10.21.3.8:61759/api/chamados/atualizar-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ChamadoId: id, NovoStatus: novo })
    })
    .then(resposta => {
        if (resposta.ok) {
            // Se o C# salvou com sucesso, recarrega a tabela!
            buscarTodos(); 
        } else {
            // Se o C# recusou (Erro 404, 500, etc), o alarme dispara!
            alert(`Erro! O C# recusou a mudança. Status do erro: ${resposta.status}`);
        }
    })
    .catch(erro => {
        alert("Erro de comunicação: A API não respondeu. " + erro);
    });
}

    // ==========================================
    // NOVAS FUNÇÕES DO MODAL
    // ==========================================
    function abrirModal(id) {
        // Procura o chamado correto pelo ID para não confundir com os filtros
        const chamado = chamadosOriginais.find(c => c.id === id);

        document.getElementById('modal-numero').innerText = chamado.numero;
        document.getElementById('modal-setor').innerText = chamado.setor;
        document.getElementById('modal-categoria').innerText = chamado.categoria;
        document.getElementById('modal-descricao').value = chamado.descricao;

        document.getElementById('fundo-modal').style.display = 'block';
        document.getElementById('modal-detalhes').style.display = 'block';
    }

    function fecharModal() {
        document.getElementById('fundo-modal').style.display = 'none';
        document.getElementById('modal-detalhes').style.display = 'none';
    }

    buscarTodos();
</script>

    <div id="fundo-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;"></div>

<div id="modal-detalhes" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:20px; border-radius:8px; width:400px; z-index:1000; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
    <h3 id="modal-numero" style="color: #0056b3; margin-top: 0;">TIC-XXXXX</h3>
    <p><strong>Setor:</strong> <span id="modal-setor"></span></p>
    <p><strong>Categoria:</strong> <span id="modal-categoria"></span></p>
    
    <hr>
    <p><strong>Descrição do Problema:</strong></p>
    <textarea id="modal-descricao" rows="6" style="width: 100%; resize: none;" readonly></textarea>
    
    <br><br>
    <button onclick="fecharModal()" style="background: #dc3545; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; width: 100%;">Fechar</button>
</div>

</body>
</html>
